function normalizeAccounts(){
    for(let name in accounts){
        const acc = accounts[name];

        if(
            acc &&
            typeof acc === "object" &&
            !Array.isArray(acc) &&
            !("items" in acc) &&
            !("maxSlots" in acc)
        ){
            accounts[name] = {
                items: { ...acc },
                maxSlots: 10
            };
            continue;
        }

        if(!acc || typeof acc !== "object" || Array.isArray(acc)){
            accounts[name] = {
                items: {},
                maxSlots: 10
            };
            continue;
        }

        if(!acc.items || typeof acc.items !== "object" || Array.isArray(acc.items)){
            acc.items = {};
        }

        let slots = Number(acc.maxSlots);
        if(!Number.isFinite(slots)) slots = 10;
        if(slots < 10) slots = 10;
        if(slots > 27) slots = 27;

        acc.maxSlots = slots;
    }

    saveAccounts();
}

function getAccountItems(accountName){
    const acc = accounts[accountName];

    if(!acc || typeof acc !== "object") return {};

    if(acc.items && typeof acc.items === "object" && !Array.isArray(acc.items)){
        return acc.items;
    }

    return acc;
}

function getAccountMaxSlots(accountName){
    const acc = accounts[accountName];

    if(!acc || typeof acc !== "object") return 10;

    let slots = Number(acc.maxSlots);
    if(!Number.isFinite(slots)) return 10;
    if(slots < 10) return 10;
    if(slots > 27) return 27;

    return slots;
}

function addAccount(){
    let name = prompt("Enter account name:");
    if(!name) return;

    name = name.trim();
    if(!name) return;

    if(accounts[name]){
        alert("Account exists");
        return;
    }

    let slotInput = prompt("Enter slot number (10 to 27)\nLeave blank for default 10:", "10");

    let maxSlots;

    if(slotInput === null){
        // user pressed cancel on slot prompt
        maxSlots = 10;
    } else {
        slotInput = String(slotInput).trim();

        if(slotInput === ""){
            maxSlots = 10;
        } else {
            maxSlots = Number(slotInput);

            if(!Number.isInteger(maxSlots) || maxSlots < 10 || maxSlots > 27){
                alert("Invalid slot number. Defaulting to 10.");
                maxSlots = 10;
            }
        }
    }

    accounts[name] = {
        items: {},
        maxSlots: maxSlots
    };

    saveAccounts();
    loadAccounts();
}

    for(let i = 0; i < names.length; i++){

        added++;

    closeModal();

function promptCustomRarity(itemName,img){

    confirmAddItem(itemName,img,rarity);

function confirmAddItem(itemName,img,rarity){
    let maxCanAdd = getAccountMaxSlots(currentAccount) - getTotalItems(currentAccount);
    if(maxCanAdd<=0){alert("Inventory FULL!"); closeModal(); return;}
    let qty=prompt(`Enter quantity (1 to ${maxCanAdd}):`);

    if(isNaN(qty)||qty<1||qty>maxCanAdd){alert("Invalid"); return;}
    let fullName=`${itemName} - (${rarity})`;
    let acc = getAccountItems(currentAccount);

    if(!acc[fullName]){
    acc[fullName] = {qty, img};
    } else {

function confirmInventoryAction(itemName, actionType){
    let acc = getAccountItems(currentAccount);
    let item = acc[itemName];

    if(!item){
        alert("Item not found.");
        return;
    }

    let maxQty = Number(item.qty) || 0;
    let qty = parseInt(document.getElementById("actionQtyInput").value);

    if(isNaN(qty) || qty < 1 || qty > maxQty){
        alert("Invalid quantity.");
        return;
    }

    let extra = {};

    if(actionType === "sold"){
    let priceGet = Number(document.getElementById("priceGetInput").value);
    let soldPrice = Number(document.getElementById("soldPriceInput").value);
    let soldPlatform = document.getElementById("soldPlatformInput").value;

    let currencyType = document.getElementById("currencyType").value;
    let robuxRate = Number(document.getElementById("robuxRateInput").value) || 0;

    let profit = (soldPrice - priceGet) * qty;
    let rate = priceGet > 0 ? (profit / priceGet) : 0;

    let profitPeso = 0;

    if(currencyType === "robux"){
        profitPeso = profit * robuxRate;
    } else {
        profitPeso = profit;
    }

    extra.unitPrice = soldPrice;
    extra.priceGet = priceGet;
    extra.profit = profit;
    extra.rate = rate;
    extra.currency = currencyType;
    extra.robuxRate = robuxRate;
    extra.profitPeso = profitPeso;
    extra.totalPrice = soldPrice * qty;
    extra.soldPlatform = soldPlatform;
}

    item.qty -= qty;

    if(item.qty <= 0){
        delete acc[itemName];
    }

    addTransaction(actionType, currentAccount, itemName, qty, extra);

    saveAccounts();
    openInventory(currentAccount);
    loadAccounts();
    closeModal();
}

function matchesTransactionDateFilter(tx, dateFilter){
    if(dateFilter === "all") return true;

    const txDate = new Date(tx.timestamp);
    const now = new Date();

    if(dateFilter === "day"){
        return (
            txDate.getFullYear() === now.getFullYear() &&
            txDate.getMonth() === now.getMonth() &&
            txDate.getDate() === now.getDate()
        );
    }

    if(dateFilter === "week"){
        const diffMs = now - txDate;
        const diffDays = diffMs / (1000 * 60 * 60 * 24);
        return diffDays >= 0 && diffDays <= 7;
    }

    if(dateFilter === "year"){
        return txDate.getFullYear() === now.getFullYear();
    }

    return true;
}

function searchBrainrot(){

    let keyword = document.getElementById("searchInput").value.toLowerCase().trim();

    if(!keyword){
        resultsDiv.innerHTML = "Enter Brainrot name.";
        return;
    }

    // ✅ DECLARE THIS (missing in your code)
    let grouped = {};
    let totals = {};   // rarity totals across all accounts

    // ======================
    // COLLECT MATCHES
    // ======================
    for(let accountName in accounts){

        let acc = getAccountItems(accountName);

        for(let itemFullName in acc){

            if(!itemFullName.toLowerCase().includes(keyword)) continue;

            let itemData = acc[itemFullName];
            let qty = Number(itemData.qty) || 0;

            // base name: "Dragon Gingerini" from "Dragon Gingerini - (Gold)"
            let baseName = itemFullName.split(" - (")[0].trim();
            let img = itemData.img || itemDatabase[baseName] || "images/empty.png";
            // rarity from "(Gold)"
            let rarityMatch = itemFullName.match(/\(([^)]+)\)/);
            let rarity = rarityMatch ? rarityMatch[1] : "Normal";

            // ✅ init grouped per baseName
            if(!grouped[baseName]){
                grouped[baseName] = {
                    img,
                    rarities: {},
                    accounts: []
                };
            }

            // ✅ add rarity qty
            grouped[baseName].rarities[rarity] =
                (grouped[baseName].rarities[rarity] || 0) + qty;

            // ✅ keep account-level rows (for left list)
            grouped[baseName].accounts.push({
                account: accountName,
                fullName: itemFullName,
                qty: qty,
                rarity: rarity
            });

            // ✅ totals box on right
            totals[rarity] = (totals[rarity] || 0) + qty;
        }
    }

    // if nothing matched
    let baseNames = Object.keys(grouped);
    if(baseNames.length === 0){
        resultsDiv.innerHTML = "Not found in any account.";
        return;
    }

    // ======================
    // BUILD LEFT LIST (per account rows)
    // ======================
    let found = [];
    baseNames.forEach(baseName => {
        grouped[baseName].accounts.forEach(row => {

            let rarity = row.rarity;

            // color logic
            let color =
                rarity === "Normal" ? "white" :
                rarity === "Gold" ? "gold" :
                rarity === "Diamond" ? "cyan" :
                "red";

            found.push({
                account: row.account,
                item: baseName + ` - (${rarity})`,
                qty: row.qty,
                color
            });
        });
    });

    // =======================
    // MAIN LAYOUT (LEFT + RIGHT)
    // =======================
    let html = `

        <button class="btn" onclick="revealAll()">Reveal All</button>
    </div>

        <div id="searchResultsLeft">

    found.forEach(f=>{

                class="blurred"
                style="
                    cursor:pointer;

            x${f.qty}

    });

    html += `</div>`;

    // RIGHT SIDE totals
    html += `

        min-width:180px;
        background:#1e293b;
        padding:10px;
        border-radius:5px;
        box-shadow:0 0 10px rgba(0,0,0,0.5);
    ">
        <b>TOTAL</b><br><br>
    `;

    const fixedOrder = ["Normal", "Gold", "Diamond"];

    fixedOrder.forEach(r => {
        if(totals[r]){
            let c = r === "Normal" ? "white" : (r === "Gold" ? "gold" : "cyan");
            html += `<div style="color:${c}; margin-bottom:5px; font-weight:bold;">${r}: ${totals[r]}</div>`;
        }
    });

    let customRarities = Object.keys(totals).filter(r => !fixedOrder.includes(r));
    customRarities.sort((a,b)=>{
        let na = parseFloat(a);
        let nb = parseFloat(b);
        if(isNaN(na) || isNaN(nb)) return a.localeCompare(b);
        return na - nb;

document.getElementById("importFile").addEventListener("change", function(event){
    const file = event.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){
        try{
            const data = JSON.parse(e.target.result);

            if(!data || !data.accounts){
                alert("Invalid backup file.");
                return;
            }

            if(!confirm("Importing will overwrite current data. Continue?")){
                return;
            }

            // Prepare imported values
            const importedAccounts =
                (data.accounts && typeof data.accounts === "object") ? data.accounts : {};

            const importedItemDatabase =
                (data.itemDatabase && typeof data.itemDatabase === "object") ? data.itemDatabase : {};

            const importedAccountOrder =
                Array.isArray(data.accountOrder) ? data.accountOrder : Object.keys(importedAccounts);

            const importedItemPrices =
                (data.itemPrices && typeof data.itemPrices === "object") ? data.itemPrices : {};

            const importedItemValues =
                (data.itemValues && typeof data.itemValues === "object") ? data.itemValues : {};

            const importedTransactionHistory =
                Array.isArray(data.transactionHistory) ? data.transactionHistory : [];

            // Apply to runtime variables
            accounts = importedAccounts;
            itemDatabase = importedItemDatabase;
            accountOrder = importedAccountOrder;
            itemValues = importedItemValues;
            transactionHistory = importedTransactionHistory;

            // Replace prices object contents safely
            Object.keys(itemPrices).forEach(key => delete itemPrices[key]);
            Object.assign(itemPrices, importedItemPrices);

            // Normalize accounts before saving
            normalizeAccounts();

            // Save EVERYTHING directly to localStorage
            localStorage.setItem("accounts", JSON.stringify(accounts));
            localStorage.setItem("itemDatabase", JSON.stringify(itemDatabase));
            localStorage.setItem("accountOrder", JSON.stringify(accountOrder));
            localStorage.setItem("itemPrices", JSON.stringify(itemPrices));
            localStorage.setItem("itemValues", JSON.stringify(itemValues));
            localStorage.setItem("transactionHistory", JSON.stringify(transactionHistory));

            console.log("Imported history count:", importedTransactionHistory.length);
            console.log("Imported history sample:", importedTransactionHistory[0]);

            document.getElementById("importFile").value = "";

            alert("Import successful! History count: " + importedTransactionHistory.length);

            location.reload();

        } catch(err){
            console.error(err);
            alert("Invalid JSON file.");
        }
    };

    reader.readAsText(file);
});

function searchAllBrainrots(){

    let keyword = document.getElementById("searchInput").value.toLowerCase().trim();
    let resultsDiv = document.getElementById("searchResults");

    let grouped = {};
    let html = `<div id="searchAllGrid">`;

    // GROUP ITEMS
    for(let accountName in accounts){

        let acc = getAccountItems(accountName);

        for(let itemFullName in acc){

            if(keyword !== "" && !itemFullName.toLowerCase().includes(keyword)) continue;

            let itemData = acc[itemFullName];
            let img = itemData.img;
            let qty = itemData.qty;

            // ✅ extract base name
            let baseName = itemFullName.split(" - (")[0].trim();
            console.log(baseName, itemValues[baseName]);
            // ✅ get value (IMPORTANT)
            let value = Object.prototype.hasOwnProperty.call(itemValues, baseName)
            ? Number(itemValues[baseName])
            : 0;

            // ✅ create if not exist
            if(!grouped[baseName]){
    grouped[baseName] = {
        img: img,
        total: 0,
        value: 0,
        accounts: []
    };
}

// 🔥 Always update value to highest detected
grouped[baseName].value = Math.max(grouped[baseName].value, value);

            // ✅ add totals
            grouped[baseName].total += qty;

            grouped[baseName].accounts.push({
                account: accountName,
                fullName: itemFullName,
                qty: qty
            });
        }
    }

    // ======================
    // SORTING 🔥
    // ======================
    let sortedItems = Object.entries(grouped);

    sortedItems.sort((a, b) => {
    const baseNameA = a[0];
    const baseNameB = b[0];

    const dataA = a[1];
    const dataB = b[1];

    const tierA = getTierRank(dataA.value);
    const tierB = getTierRank(dataB.value);

    // 1. Sort by tier first
    if (tierB !== tierA) {
        return tierB - tierA;
    }

    // 2. If same tier, sort by highest price
    const priceA = Number(itemPrices[baseNameA] || 0);
    const priceB = Number(itemPrices[baseNameB] || 0);

    if (priceB !== priceA) {
        return priceB - priceA;
    }

    // 3. If same price, sort by total qty
    if (dataB.total !== dataA.total) {
        return dataB.total - dataA.total;
    }

    // 4. If same pa rin, alphabetical
    return baseNameA.localeCompare(baseNameB);
});

    let foundAny = false;

    // ======================
    // DISPLAY
    // ======================
    for(let [baseName, data] of sortedItems){

    foundAny = true;

    // detect highest priority rarity
    let rarityCount = {};

    data.accounts.forEach(obj=>{
        let match = obj.fullName.match(/\(([^)]+)\)/);
        let rarity = match ? match[1] : "Normal";

        if(!rarityCount[rarity]){
            rarityCount[rarity] = 0;
        }

        rarityCount[rarity] += obj.qty;
    });

    let rarityToShow = "";
    let qtyToShow = 0;

    if(rarityCount["Normal"]){
        rarityToShow = "Normal";
        qtyToShow = rarityCount["Normal"];
    }
    else if(rarityCount["Gold"]){
        rarityToShow = "Gold";
        qtyToShow = rarityCount["Gold"];
    }
    else if(rarityCount["Diamond"]){
        rarityToShow = "Diamond";
        qtyToShow = rarityCount["Diamond"];
    }
    else{
    let highestCustom = null;
    let highestValue = -1;

    for(let r in rarityCount){

        // skip normal/gold/diamond
        if(["Normal","Gold","Diamond"].includes(r)) continue;

        // kunin number (ex: 322M/s → 322)
        let num = parseFloat(r);

        if(num > highestValue){
            highestValue = num;
            highestCustom = r;
        }
    }

    rarityToShow = highestCustom;
    qtyToShow = rarityCount[highestCustom];
}

    let price = itemPrices[baseName] || 0;

html += `
<div class="searchAllItem"
    onclick="openBrainrotAccountSelector('${baseName}')"
    oncontextmenu="event.preventDefault(); changePrice('${baseName}');">

    <!-- 🔥 PRICE TAG -->
    <div class="item-price">₱${price.toLocaleString()}</div>

    <img src="${data.img}" onerror="this.src='images/empty.png'">

    <p class="item-name">
        ${baseName}
        <span style="color:orange;">
            (${rarityToShow})
        </span>
        <span class="item-total">
            (${qtyToShow}x)
        </span>
    </p>

</div>
`;
}

    html += `</div>`;

    if(!foundAny){
        resultsDiv.innerHTML = "No Brainrots found.";
        return;
    }

    resultsDiv.innerHTML = html;

    // save for modal
    window.groupedSearchData = grouped;
}
function openBrainrotAccountSelector(baseName){

    let data = window.groupedSearchData[baseName];
    if(!data) return;

    // 🔥 SORT BY RARITY ORDER
    const rarityOrder = {
        "Normal": 1,
        "Gold": 2,
        "Diamond": 3
    };

    data.accounts.sort((a, b) => {

        let rarityA = a.fullName.match(/\(([^)]+)\)/);
        let rarityB = b.fullName.match(/\(([^)]+)\)/);

        rarityA = rarityA ? rarityA[1] : "Normal";
        rarityB = rarityB ? rarityB[1] : "Normal";

        let orderA = rarityOrder[rarityA] || 4; // custom rarities = 4
        let orderB = rarityOrder[rarityB] || 4;

        if(orderA !== orderB){
            return orderA - orderB;
        }

        // optional: sort by qty inside same rarity (highest first)
        return b.qty - a.qty;
    });

    let html = `<h3>${baseName}</h3>
                <p>Total: ${data.total}</p>
                <div class="modal-grid">`;

    data.accounts.forEach(obj => {
    html += `
    <button
        onclick="openInventoryFromSearch('${obj.account}')"
        oncontextmenu="event.preventDefault(); openTransferBrainrotModal('${jsSafe(obj.account)}', '${jsSafe(obj.fullName)}')">
        ${obj.account} <br>
        ${obj.fullName} x${obj.qty}
    </button>
    `;
});

    html += `
        </div>
        <button onclick="closeModal()">Close</button>
    `;

    showModal(html);
}

function transferSelectedItems(){
    let toAccount = document.getElementById("multiTransferTarget").value;

    if(!toAccount || !accounts[toAccount]){
        alert("Invalid target account.");
        return;
    }

    let fromItems = getAccountItems(currentAccount);
    let toItems = getAccountItems(toAccount);

    let checkboxes = document.querySelectorAll(".multiItem:checked");

    if(checkboxes.length === 0){
        alert("Select at least one item.");
        return;
    }

    // 🔥 calculate total qty first (for slot check)
    let totalTransferQty = 0;
    let transfers = [];

    checkboxes.forEach(cb => {
        let itemName = cb.value;

        let qtyInput = document.querySelector(`.multiQty[data-item="${CSS.escape(itemName)}"]`);
        let qty = Number(qtyInput.value);

        let available = fromItems[itemName]?.qty || 0;

        if(!Number.isInteger(qty) || qty < 1 || qty > available){
            return;
        }

        totalTransferQty += qty;
        transfers.push({ itemName, qty });
    });

    if(transfers.length === 0){
        alert("No valid items selected.");
        return;
    }

    let freeSlots = getAccountMaxSlots(toAccount) - getTotalItems(toAccount);

    if(freeSlots < totalTransferQty){
        alert(`Not enough space in ${toAccount}. Available slots: ${freeSlots}`);
        return;
    }

    // 🔥 APPLY ALL TRANSFERS
    transfers.forEach(t => {
        let itemData = fromItems[t.itemName];

        if(!toItems[t.itemName]){
            toItems[t.itemName] = {
                qty: t.qty,
                img: itemData.img
            };
        } else {
            toItems[t.itemName].qty += t.qty;
        }

        itemData.qty -= t.qty;

        if(itemData.qty <= 0){
            delete fromItems[t.itemName];
        }

        addTransaction("transfer", currentAccount, t.itemName, t.qty, { toAccount });
    });

    saveAccounts();
    loadAccounts();
    closeModal();

    try{ searchAllBrainrots(); } catch(e){}
}

function confirmTransferBrainrot(fromAccount, fullItemName, forcedToAccount = null, forcedQty = null){
    let toAccount = forcedToAccount || document.getElementById("transferTargetAccount")?.value;
    let qty = forcedQty || Number(document.getElementById("transferQty")?.value);

    if(!toAccount || !accounts[toAccount]){
        alert("Target account does not exist.");
        return;
    }

    let fromItems = getAccountItems(fromAccount);
    let toItems = getAccountItems(toAccount);

    let itemData = fromItems[fullItemName];
    if(!itemData){
        alert("Item not found in source account.");
        return;
    }

    let availableQty = Number(itemData.qty) || 0;
    if(!Number.isInteger(qty) || qty < 1 || qty > availableQty){
        alert("Invalid quantity.");
        return;
    }

    let freeSlots = getAccountMaxSlots(toAccount) - getTotalItems(toAccount);
    if(freeSlots < qty){
        alert(`Not enough space in ${toAccount}. Available slots: ${freeSlots}`);
        return;
    }

    if(!toItems[fullItemName]){
        toItems[fullItemName] = {
            qty: qty,
            img: itemData.img
        };
    } else {
        toItems[fullItemName].qty += qty;
    }

    fromItems[fullItemName].qty -= qty;
    if(fromItems[fullItemName].qty <= 0){
        delete fromItems[fullItemName];
    }
    addTransaction("transfer", fromAccount, fullItemName, qty, { toAccount });

    saveAccounts();
    loadAccounts();
    closeModal();

    try{
        searchAllBrainrots();
    }catch(e){}

    try{
        openBrainrotAccountSelector(fullItemName.split(" - (")[0].trim());
    }catch(e){}
}
function enableSmoothDrag(){

    let buttons =
        document.querySelectorAll("#accounts .btn");

    buttons.forEach((btn,index)=>{

        if(btn.innerText.includes("Add Account")) return;

        btn.onmousedown=function(e){

    // ❌ wag galawin pag right click
    if(e.button !== 0) return;

            let draggedIndex=index-1;

            btn.style.opacity="0.5";

            document.onmouseup=function(){

                btn.style.opacity="1";

                document.onmousemove=null;

            };

            document.onmousemove=function(e){

                let elementBelow =
                    document.elementFromPoint(
                        e.clientX,
                        e.clientY
                    );

                if(!elementBelow) return;

                if(
                    elementBelow.classList.contains("btn") &&
                    !elementBelow.innerText.includes("Add Account")
                ){

                    let buttonsArray =
                        [...document.querySelectorAll("#accounts .btn")]
                        .filter(b=>!b.innerText.includes("Add Account"));

                    let targetIndex =
                        buttonsArray.indexOf(elementBelow);

                    if(targetIndex===-1) return;

                    let moved=
                        accountOrder.splice(draggedIndex,1)[0];

                    accountOrder.splice(targetIndex,0,moved);

                    draggedIndex=targetIndex;

                    saveAccountOrder();
                    loadAccounts();

                }

            };

        };

    });

}

function addTransaction(type, account, itemName, qty, extra = {}){
    transactionHistory.unshift({
        type,
        account,
        itemName,
        qty,
        timestamp: new Date().toISOString(),
        ...extra
    });

    if(transactionHistory.length > 1000){
        transactionHistory = transactionHistory.slice(0, 1000);
    }

    saveTransactionHistory();
}
function getTierLabel(value){
    value = Number(value);
    if(!value) return "Unrated";

    switch(value){
        case 1: return "Low Tier";
        case 2: return "Semi Mid Tier";
        case 3: return "Mid Tier";
        case 4: return "High Tier";
        case 5: return "Ultra High Tier";
        default: return "Unrated";
    }
}

function getTierClass(value){
    value = Number(value);
    if(!value) return "";

    switch(value){
        case 1: return "tier-1";
        case 2: return "tier-2";
        case 3: return "tier-3";
        case 4: return "tier-4";
        case 5: return "tier-5";
        default: return "";
    }
}
function getTierRank(value){
    value = Number(value) || 0;

    if(value === 5) return 5;
    if(value === 4) return 4;
    if(value === 3) return 3;
    if(value === 2) return 2;
    if(value === 1) return 1;
    return 0; // Unrated
}
function renderRoute(){

    window.scrollTo(0,0);

    const hash = location.hash.replace("#", "");

    if(hash.startsWith("inv=")){
        const accountName = decodeURIComponent(hash.slice(4));

        // ✅ HIDE ACCOUNTS
        document.getElementById("accountPage").style.display = "none";
        document.getElementById("inventoryPage").style.display = "block";

        openInventory(accountName);

    } else {

        // ✅ SHOW ACCOUNTS
        document.getElementById("inventoryPage").style.display = "none";
        document.getElementById("accountPage").style.display = "block";

        loadAccounts();
    }
}
